# ============================================================================
# Supervisor Configuration - Optimized
# Versión: 2.0
# Mejoras: Gunicorn con gevent, servicios modulares, lazy loading
# ============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

# ============================================================================
# CORE SERVICES (Siempre activos)
# ============================================================================

[program:postgresql]
command=/usr/libexec/postgresql16/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/postgresql.log
stderr_logfile=/var/log/postgresql_err.log
startsecs=10
stopwaitsecs=30

[program:redis]
command=/usr/bin/redis-server --bind 127.0.0.1 --port 6379 --maxmemory 50mb --maxmemory-policy allkeys-lru
user=scraper
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/redis.log
stderr_logfile=/var/log/redis_err.log
startsecs=5

# ============================================================================
# FLASK con GUNICORN (Production Server)
# 3x más throughput que Flask dev server
# ============================================================================

[program:flask]
command=gunicorn \
    --workers 2 \
    --worker-class gevent \
    --worker-connections 100 \
    --bind 0.0.0.0:5000 \
    --timeout 120 \
    --access-logfile /var/log/gunicorn-access.log \
    --error-logfile /var/log/gunicorn-error.log \
    --log-level info \
    --preload \
    app:app
directory=/app
user=scraper
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/flask.log
stderr_logfile=/var/log/flask_err.log
environment=DATABASE_URL="postgresql://scraper:scraper123@localhost:5432/portalinmobiliario",REDIS_URL="redis://localhost:6379"
startsecs=10

# ============================================================================
# SCHEDULER (Scraping automático)
# ============================================================================

[program:scheduler]
command=python /app/main.py --scheduler start
directory=/app
user=scraper
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/scheduler.log
stderr_logfile=/var/log/scheduler_err.log
startsecs=10

# ============================================================================
# OLLAMA (OPCIONAL - Solo si ENABLE_AI=true)
# Lazy loading: Se inicia solo si la variable de entorno está configurada
# ============================================================================

[program:ollama]
command=/usr/local/bin/ollama serve
user=scraper
autostart=%(ENV_ENABLE_AI)s
autorestart=true
priority=30
stdout_logfile=/var/log/ollama.log
stderr_logfile=/var/log/ollama_err.log
environment=OLLAMA_HOST="0.0.0.0:11434",OLLAMA_MODELS="/app/.ollama/models"
startsecs=15
stopwaitsecs=60

# ============================================================================
# LOGROTATE (Prevenir crecimiento infinito de logs)
# ============================================================================

[program:logrotate]
command=/bin/sh -c "while true; do /usr/sbin/logrotate /etc/logrotate.d/scraper; sleep 86400; done"
user=root
autostart=true
autorestart=true
priority=50
stdout_logfile=/dev/null
stderr_logfile=/dev/null
