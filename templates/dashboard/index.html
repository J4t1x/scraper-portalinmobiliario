{% extends "base.html" %}

{% block title %}Dashboard - Portal Inmobiliario Scraper{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold text-slate-900">Dashboard</h1>
        <div class="text-sm text-slate-600">
            <i data-lucide="clock" class="w-4 h-4 inline"></i>
            <span id="current-time"></span>
        </div>
    </div>

    <!-- KPIs Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Total Propiedades -->
        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-600 mb-1">Total Propiedades</p>
                    <p class="text-3xl font-bold text-slate-900" id="total-properties">-</p>
                </div>
                <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                    <i data-lucide="home" class="w-6 h-6 text-blue-600"></i>
                </div>
            </div>
        </div>

        <!-- Por Operación -->
        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-600 mb-1">Por Operación</p>
                    <p class="text-sm text-slate-500 mt-1" id="operacion-breakdown">-</p>
                </div>
                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                    <i data-lucide="bar-chart-2" class="w-6 h-6 text-green-600"></i>
                </div>
            </div>
        </div>

        <!-- Por Tipo -->
        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-600 mb-1">Por Tipo</p>
                    <p class="text-sm text-slate-500 mt-1" id="tipo-breakdown">-</p>
                </div>
                <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                    <i data-lucide="pie-chart" class="w-6 h-6 text-purple-600"></i>
                </div>
            </div>
        </div>

        <!-- Archivos JSON -->
        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-600 mb-1">Archivos JSON</p>
                    <p class="text-3xl font-bold text-slate-900" id="files-loaded">-</p>
                </div>
                <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center">
                    <i data-lucide="file-text" class="w-6 h-6 text-yellow-600"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row 1 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Distribución por Operación -->
        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
            <h2 class="text-lg font-semibold text-slate-900 mb-4">Distribución por Operación</h2>
            <div class="relative h-64">
                <canvas id="chart-operacion"></canvas>
            </div>
        </div>

        <!-- Distribución por Tipo -->
        <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
            <h2 class="text-lg font-semibold text-slate-900 mb-4">Distribución por Tipo</h2>
            <div class="relative h-64">
                <canvas id="chart-tipo"></canvas>
            </div>
        </div>
    </div>

    <!-- Top 10 Comunas -->
    <div class="bg-white rounded-lg shadow p-6 border border-slate-200">
        <h2 class="text-lg font-semibold text-slate-900 mb-4">Top 10 Comunas</h2>
        <div class="relative h-80">
            <canvas id="chart-comunas"></canvas>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
