[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=72
markers =
    unit: Tests unitarios (rápidos, aislados)
    integration: Tests de integración
    e2e: Tests end-to-end (lentos, con scraping real)
    slow: Tests que toman tiempo
    selenium: Tests que requieren Selenium/WebDriver
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
