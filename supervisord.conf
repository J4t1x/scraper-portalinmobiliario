[supervisord]
nodaemon=true
user=root

[program:postgresql]
command=/usr/lib/postgresql/15/bin/postgres -D /var/lib/postgresql/data
user=postgres
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/postgresql.log
stderr_logfile=/var/log/postgresql_err.log

[program:ollama]
command=/usr/local/bin/ollama serve
user=scraper
autostart=true
autorestart=true
priority=5
stdout_logfile=/var/log/ollama.log
stderr_logfile=/var/log/ollama_err.log
environment=OLLAMA_HOST="0.0.0.0:11434",OLLAMA_MODELS="/app/.ollama/models"

[program:flask]
command=python /app/app.py
directory=/app
user=scraper
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/flask.log
stderr_logfile=/var/log/flask_err.log
environment=DATABASE_URL="postgresql://scraper:scraper123@localhost:5432/portalinmobiliario"

[program:scheduler]
command=python /app/main.py --scheduler start
directory=/app
user=scraper
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/scheduler.log
stderr_logfile=/var/log/scheduler_err.log
